<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 280px;
        padding: 12px 16px;
        font-family: system-ui, sans-serif;
        background: #0d0d14;
        color: #e8e8f0;
        margin: 0;
      }
      h1 { font-size: 14px; font-weight: 600; margin: 0 0 10px; color: #b8b8d0; letter-spacing: 0.05em; }
      button {
        width: 100%;
        padding: 8px 12px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        margin-bottom: 6px;
      }
      #clip-page { background: #5b5bec; color: #fff; }
      #clip-selection { background: #1e1e2e; color: #b8b8d0; border: 1px solid #2e2e3e; }
      #status { font-size: 12px; color: #6b6b8a; margin-top: 8px; min-height: 16px; }
      #status.ok { color: #4ade80; }
      #status.err { color: #f87171; }
    </style>
  </head>
  <body>
    <h1>Auralith Clipper</h1>
    <button id="clip-page">Clip full page</button>
    <button id="clip-selection">Clip selection</button>
    <div id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
