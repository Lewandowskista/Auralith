name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Test
        run: pnpm test

      - name: Build app
        run: pnpm build

      - name: Bundle size check
        shell: bash
        run: |
          # Check renderer bundle (gzip). Budget: 1.2 MB
          BUDGET_BYTES=1258291
          RENDERER_DIR="apps/desktop/out/renderer"
          if [ -d "$RENDERER_DIR" ]; then
            BUNDLE_SIZE=$(find "$RENDERER_DIR" -name "*.js" -not -name "*.map" | xargs gzip -c | wc -c)
            echo "Renderer JS bundle gzip size: $BUNDLE_SIZE bytes (budget: $BUDGET_BYTES)"
            if [ "$BUNDLE_SIZE" -gt "$BUDGET_BYTES" ]; then
              echo "::error::Bundle size $BUNDLE_SIZE bytes exceeds 1.2 MB gzip budget"
              exit 1
            fi
          else
            echo "Renderer output dir not found — skipping bundle size check"
          fi

  build-installer:
    runs-on: windows-latest
    needs: test-and-build
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Build installer
        run: pnpm build:installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: auralith-installer-${{ github.sha }}
          path: apps/desktop/release/*.exe
          retention-days: 14
